x-api: &api
  image: ttl.sh/renatograsso10-rinha-2026-go@sha256:33a78d850441ff94e11a74d8789c2c3c762638b5325f51804d9f62c52781d044
  environment:
    CLASSIFIER_MODE: linear
    VISIT_CAP: "256"
    GOMAXPROCS: "1"
    GOMEMLIMIT: 64MiB
    GOGC: "100"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rinha-nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "32MB"

  api1:
    <<: *api
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "159MB"

  api2:
    <<: *api
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "159MB"
