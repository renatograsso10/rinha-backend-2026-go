x-api: &api
    image: ${API_IMAGE:-ghcr.io/renatograsso10/rinha-backend-2026-go-runtime:knn}
    build:
      context: .
      dockerfile: Dockerfile
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

services:
  api1:
    <<: *api
    ports:
      - "9999:8080"
    deploy:
      resources:
        limits:
          cpus: "0.90"
          memory: "250MB"

  api2:
    <<: *api
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "100MB"
