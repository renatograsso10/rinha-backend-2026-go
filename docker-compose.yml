x-api: &api
    image: ghcr.io/renatograsso10/rinha-backend-2026-go-runtime@sha256:e8c78e68e4042e4f08def5491ecd012ea408b21c07bf3937f4132f918f85d3ed
    environment:
      CLASSIFIER_MODE: forest
      VISIT_CAP: "256"
      GOMAXPROCS: "1"
      GOMEMLIMIT: 128MiB
      GOGC: "100"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "32MB"

  api1:
    <<: *api
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "159MB"

  api2:
    <<: *api
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "159MB"
