name: Publish Runtime Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile.runtime
      - go.mod
      - go.sum
      - cmd/**
      - internal/**
      - .github/workflows/publish-runtime.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          platforms: linux/amd64
          push: true
          tags: ghcr.io/renatograsso10/rinha-backend-2026-go-runtime:latest
          labels: org.opencontainers.image.source=https://github.com/renatograsso10/rinha-backend-2026-go
